name: loading_ui
description: "A collection of 35+ beautiful, customizable loading animations for Flutter. This is an AI-created version based on the work of loading-ui.com."
version: 0.1.0-dev.1
homepage: https://github.com/anfeMurillo/Loading-UI-Flutter-Package
repository: https://github.com/anfeMurillo/Loading-UI-Flutter-Package.git
topics:
  - loading
  - spinner
  - animation
  - ui

environment:
  sdk: ^3.11.5
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
